title: Fuqiao Xue
subtitle: Web standards and internationalization
description: Personal website for Fuqiao Xue, focused on Web standards, internationalization, AI-assisted work, and knowledge systems.
keywords:
  - internationalization
  - web standards
  - W3C
  - i18n
author: Fuqiao Xue
language: en
timezone: Asia/Shanghai
url: https://xuefuqiao.com
root: /
permalink: writing/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ""
filename_case: 1
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: false
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: true

index_generator:
  path: ""
  per_page: 10
  order_by: -date

default_category: uncategorized
category_map:
tag_map:
metadata:
meta_generator: true

date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

per_page: 10
pagination_dir: page
theme: fuqiao-xue
